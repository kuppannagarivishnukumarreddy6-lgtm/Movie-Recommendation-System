{% extends "base.html" %}

{% block content %}

<section class="contact-page">

    <div class="contact-container">

        <h1>Contact Us</h1>

        <p class="contact-subtitle">
            We'd love to hear your feedback about MovieAI.
        </p>

        <form class="contact-form">

            <div class="input-group">

                <label>Name</label>

                <input
                    type="text"
                    placeholder="Enter your name"
                    required>

            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label>Subject</label>

                <input
                    type="text"
                    placeholder="Subject">

            </div>

            <div class="input-group">

                <label>Message</label>

                <textarea
                    rows="6"
                    placeholder="Write your message here..."
                    required></textarea>

            </div>

            <button type="submit" class="send-btn">

                <i class="fas fa-paper-plane"></i>

                Send Message

            </button>

        </form>

    </div>

</section>

{% endblock %}
